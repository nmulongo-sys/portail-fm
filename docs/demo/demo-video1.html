<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auto-démo · Vidéo 1 — Le portail en une minute</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     AUTO-DÉMO VIDÉO 1 — pilote l'app réelle dans une iframe.
     Usage : ouvrir cette page (même domaine que le portail),
     lancer l'enregistrement d'écran, cliquer « Lancer ».
     La séquence dure 60 s et suit le storyboard du pack vidéo 1.
     ========================================================= */
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #efe7d8; }

  #stage { position: absolute; inset: 0; transition: transform .45s cubic-bezier(.4,0,.2,1); transform-origin: 50% 30%; }
  #app { width: 100%; height: 100%; border: 0; }

  /* Curseur simulé */
  #cursor { position: absolute; z-index: 50; width: 26px; height: 26px; pointer-events: none;
    transition: left .8s cubic-bezier(.45,0,.25,1), top .8s cubic-bezier(.45,0,.25,1); left: 50%; top: 60%; }
  #cursor svg { filter: drop-shadow(0 2px 4px rgba(42,34,27,.45)); }

  /* Halo doré de clic */
  .halo { position: absolute; z-index: 40; border: 3px solid #b3763b; border-radius: 12px; pointer-events: none;
    animation: haloPulse 1s ease-out 2; }
  @keyframes haloPulse { 0% { box-shadow: 0 0 0 0 rgba(179,118,59,.55); } 100% { box-shadow: 0 0 0 22px rgba(179,118,59,0); } }

  /* Couche d'overlays (non zoomée) */
  #overlays { position: absolute; inset: 0; z-index: 60; pointer-events: none; }

  .hook { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center;
    background: #6b4a2e; color: #f7f1e6; font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 54px;
    line-height: 1.15; padding: 40px; transition: transform .6s cubic-bezier(.6,0,.3,1); }
  .hook.out { transform: translateY(-105%); }

  .chip { position: absolute; left: 50%; bottom: 46px; transform: translateX(-50%) scale(.7); opacity: 0;
    font-family: 'JetBrains Mono', monospace; font-size: 15px; letter-spacing: .22em; color: #f7f1e6;
    background: #b3763b; border-radius: 999px; padding: 12px 26px; transition: all .25s ease; white-space: nowrap; }
  .chip.on { opacity: 1; transform: translateX(-50%) scale(1); }

  .pop { position: absolute; opacity: 0; transform: rotate(-2deg) scale(.6);
    font-family: 'Work Sans', sans-serif; font-weight: 600; font-size: 22px; color: #2a221b;
    background: #f7f1e6; border: 1px solid rgba(107,74,46,.3); border-radius: 12px; padding: 14px 22px;
    box-shadow: 0 10px 28px rgba(42,34,27,.18); transition: all .22s cubic-bezier(.34,1.56,.64,1); }
  .pop.on { opacity: 1; transform: rotate(-2deg) scale(1); }

  .outro { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; background: #efe7d8; text-align: center; }
  .outro.on { display: flex; }
  .outro .t1 { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 46px; color: #2a221b; }
  .outro .t2 { font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: .18em; color: #b3763b; }

  /* Barre de contrôle (masquée pendant la lecture) */
  #bar { position: absolute; z-index: 100; left: 50%; bottom: 22px; transform: translateX(-50%);
    display: flex; gap: 10px; align-items: center; background: rgba(42,34,27,.92); border-radius: 999px; padding: 10px 16px; }
  #bar.hidden { display: none; }
  #bar button { font-family: 'Work Sans', sans-serif; font-weight: 600; font-size: 14px; color: #f7f1e6;
    background: #b3763b; border: 0; border-radius: 999px; padding: 10px 22px; cursor: pointer; }
  #bar span { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #efe7d8; letter-spacing: .08em; }
</style>
</head>
<body>

<div id="stage">
  <iframe id="app" src="../../index.html"></iframe>
  <div id="cursor"><svg viewBox="0 0 24 24" width="26" height="26"><path d="M4 2 L4 20 L9 15.5 L12.5 22 L15 20.8 L11.6 14.5 L18 14 Z" fill="#2a221b" stroke="#f7f1e6" stroke-width="1.4"/></svg></div>
</div>

<div id="overlays">
  <div class="hook" id="hook">Toute ta classe de musique.<br>Une seule page.</div>
  <div class="chip" id="chip"></div>
  <div class="outro" id="outro">
    <div class="t1">Épisode 2 : ton tableau de bord →</div>
    <div class="t2">NMULONGO-SYS.GITHUB.IO/PORTAIL-FM</div>
  </div>
</div>

<div id="bar">
  <button id="go">▶&nbsp; Lancer la séquence (60 s)</button>
  <span>Lancez votre enregistrement d'écran d'abord · Échap pour arrêter</span>
</div>

<script>
(function () {
  'use strict';
  var app = document.getElementById('app');
  var stage = document.getElementById('stage');
  var cursor = document.getElementById('cursor');
  var overlays = document.getElementById('overlays');
  var hook = document.getElementById('hook');
  var chip = document.getElementById('chip');
  var outro = document.getElementById('outro');
  var bar = document.getElementById('bar');
  var timers = [], running = false;

  function at(ms, fn) { timers.push(setTimeout(function () { try { fn(); } catch (e) {} }, ms)); }
  function stopAll() { timers.forEach(clearTimeout); timers = []; running = false; bar.classList.remove('hidden'); }
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') { stopAll(); zoom(1, 50, 30); } });

  function doc() { return app.contentDocument; }
  function win() { return app.contentWindow; }

  // Trouve un lien de la nav par son texte
  function navLink(txt) {
    var links = doc().querySelectorAll('a, button, div');
    for (var i = 0; i < links.length; i++) {
      var l = links[i];
      if (l.children.length === 0 && (l.textContent || '').trim() === txt) return l;
    }
    return null;
  }
  // Position (dans la page) du centre d'un élément
  function center(el) {
    var r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2, r: r };
  }
  function moveCursorTo(el) {
    if (!el) return;
    var c = center(el);
    cursor.style.left = c.x + 'px';
    cursor.style.top = c.y + 'px';
  }
  function halo(el) {
    if (!el) return;
    var c = center(el).r;
    var h = document.createElement('div');
    h.className = 'halo';
    h.style.left = (c.left - 8) + 'px'; h.style.top = (c.top - 8) + 'px';
    h.style.width = (c.width + 16) + 'px'; h.style.height = (c.height + 16) + 'px';
    stage.appendChild(h);
    setTimeout(function () { h.remove(); }, 2100);
  }
  // Zoom : échelle + point de focus (en % du viewport)
  function zoom(s, ox, oy) {
    stage.style.transformOrigin = ox + '% ' + oy + '%';
    stage.style.transform = 'scale(' + s + ')';
  }
  function nav(href) { app.src = href; }
  function keyword(txt) {
    chip.classList.remove('on');
    if (txt) { chip.textContent = txt; requestAnimationFrame(function () { requestAnimationFrame(function () { chip.classList.add('on'); }); }); }
  }
  function pop(txt, xPct, yPct, ms) {
    var p = document.createElement('div');
    p.className = 'pop'; p.textContent = txt;
    p.style.left = xPct + '%'; p.style.top = yPct + '%';
    overlays.appendChild(p);
    requestAnimationFrame(function () { requestAnimationFrame(function () { p.classList.add('on'); }); });
    setTimeout(function () { p.classList.remove('on'); setTimeout(function () { p.remove(); }, 300); }, ms || 2600);
  }
  function clickNav(txt, href) {
    var el = navLink(txt);
    moveCursorTo(el);
    setTimeout(function () { halo(el); }, 850);
    setTimeout(function () { nav(href); }, 1500);
  }

  // ------------------- LA SÉQUENCE (60 s) -------------------
  function play() {
    if (running) return;
    running = true;
    bar.classList.add('hidden');
    hook.classList.remove('out');
    outro.classList.remove('on');
    nav('../../index.html');
    zoom(1.1, 50, 20);

    // Plan 1 · 0:00–0:03 — hook plein écran, léger dézoom
    at(400, function () { zoom(1, 50, 20); });
    at(3000, function () { hook.classList.add('out'); });

    // Plan 2 · 0:03–0:10 — zoom hero + panoramique
    at(3300, function () { zoom(1.4, 30, 28); });
    at(6500, function () { zoom(1.4, 62, 28); });

    // Plan 3 · 0:10–0:18 — clic Tableau de bord
    at(10000, function () {
      keyword('TABLEAU DE BORD');
      zoom(1.6, 62, 8);
      clickNav('Tableau de bord', '../../tableau-de-bord.html');
    });
    at(12300, function () { zoom(1.15, 50, 25); });

    // Plan 4 · 0:18–0:24 — clic Journal de classe
    at(18000, function () {
      keyword('JOURNAL DE CLASSE');
      zoom(1.6, 68, 8);
      clickNav('Journal de classe', '../../journal-de-classe.html');
    });
    at(20300, function () { zoom(1.15, 50, 25); });

    // Plan 5 · 0:24–0:30 — clic Annuaire
    at(24000, function () {
      keyword('ANNUAIRE');
      zoom(1.6, 74, 8);
      clickNav('Annuaire', '../../annuaire.html');
    });
    at(26300, function () { zoom(1.15, 45, 30); });

    // Plan 6 · 0:30–0:38 — retour accueil, survol des cartes
    at(30000, function () {
      keyword('');
      zoom(1.6, 56, 8);
      clickNav('Accueil', '../../index.html');
    });
    at(32300, function () {
      zoom(1.3, 35, 55);
      pop('Cliquez. C’est tout.', 12, 18, 3000);
    });
    at(33000, function () {
      // petit « soulèvement » des cartes au passage du curseur
      var cards = doc().querySelectorAll('.fm-card');
      var i = 0;
      function next() {
        if (i >= Math.min(cards.length, 4) || !running) return;
        var el = cards[i];
        moveCursorTo(el);
        el.style.transform = 'translateY(-3px)'; el.style.borderColor = '#b3763b';
        setTimeout(function (prev) { return function () { prev.style.transform = ''; prev.style.borderColor = ''; }; }(el), 1100);
        i++; setTimeout(next, 1200);
      }
      next();
    });

    // Plan 7 · 0:38–0:45 — mode sombre puis retour clair
    at(38000, function () {
      zoom(1, 50, 30);
      pop('☾ mode sombre', 68, 12, 2600);
      var b = doc().getElementById('themeToggle');
      moveCursorTo(b);
      setTimeout(function () { halo(b); if (win().toggleTheme) win().toggleTheme(); }, 900);
    });
    at(43200, function () { if (win().toggleTheme) win().toggleTheme(); });

    // Plan 8 · 0:45–0:53 — scroll vers les applis musicales
    at(45000, function () {
      keyword('3 APPLIS MUSICALES');
      var h2s = doc().querySelectorAll('h2');
      for (var i = 0; i < h2s.length; i++) {
        if (/applis musicales/i.test(h2s[i].textContent)) { h2s[i].scrollIntoView({ behavior: 'smooth', block: 'start' }); break; }
      }
      zoom(1.35, 50, 45);
    });
    at(48500, function () {
      var cards = doc().querySelectorAll('.fm-card[data-app]');
      if (cards[0]) moveCursorTo(cards[0]);
      setTimeout(function () { if (cards[1]) moveCursorTo(cards[1]); }, 1400);
      setTimeout(function () { if (cards[2]) moveCursorTo(cards[2]); }, 2800);
    });

    // Plan 9 · 0:53–1:00 — retour haut, dézoom, outro
    at(53000, function () {
      keyword('');
      win().scrollTo({ top: 0, behavior: 'smooth' });
      zoom(1, 50, 30);
    });
    at(57000, function () { outro.classList.add('on'); });
    at(60000, function () { stopAll(); });
  }

  document.getElementById('go').addEventListener('click', play);
})();
</script>
</body>
</html>
